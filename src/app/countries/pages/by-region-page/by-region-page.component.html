<h2>Search By Region</h2>
<hr />
<div class="row">
  <div class="col">
    <!-- SearchBox -->
    <shared-search-box

      (onValue)="searchByRegion($event)"

  </div>
</div>
<div class="row">
  <div class="col">
    <hr />
    <!-- result table -->
    <countries-table [countries]="countries" ></countries-table>
  </div>
</div>
