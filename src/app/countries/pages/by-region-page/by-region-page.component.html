<!-- (onValue)="searchByRegion($event)" ///(onValue) -->
<h2>Search By Region</h2>
<hr />
<div class="row">
  <div class="col">
    <!-- SearchBox -->
    <shared-search-box
      placeHolder="Search by Region"
      (onDebounce)="searchByRegion($event)"
    ></shared-search-box>
  </div>
</div>
<div class="row">
  <div class="col">
    <hr />
    <shared-loading-spinner *ngIf="isLoading"></shared-loading-spinner>
    <!-- result table -->
    <countries-table [countries]="countries"></countries-table>
  </div>
</div>
